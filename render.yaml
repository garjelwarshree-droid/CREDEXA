services:
  # Static site — the React/Vite frontend (card-recommender)
  - type: web
    name: credexa-frontend
    runtime: static
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/card-recommender run build
    staticPublishPath: artifacts/card-recommender/dist/public
    pullRequestPreviewsEnabled: false
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
